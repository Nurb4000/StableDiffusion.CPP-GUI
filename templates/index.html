<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stable Diffusion GUI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        
        h1, h2, h3, h4, h5, h6 {
            color: #ffffff;
            font-weight: 600;
        }
        
        .card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .card-body {
            padding: 1.5rem;
        }
        
        .form-label {
            color: #f0f0f0;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        
        .form-control, .form-select {
            background-color: #2d2d2d;
            color: #ffffff;
            border: 1px solid #444;
            padding: 0.5rem 0.75rem;
        }
        
        .form-control:focus, .form-select:focus {
            background-color: #2d2d2d;
            color: #ffffff;
            border-color: #666;
            box-shadow: 0 0 0 0.25rem rgba(130, 130, 130, 0.25);
        }
        
        .form-check-label {
            color: #f0f0f0;
        }
        
        .btn-primary {
            background-color: #1a73e8;
            border-color: #1a73e8;
            font-weight: 500;
        }
        
        .btn-primary:hover {
            background-color: #1557b0;
            border-color: #1557b0;
        }
        
        .btn-outline-secondary {
            color: #f0f0f0;
            border-color: #5f6368;
        }
        
        .btn-outline-secondary:hover {
            background-color: #5f6368;
            border-color: #5f6368;
        }
        
        .output-image {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 20px;
            border: 1px solid #444;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }
        
        .spinner-border {
            width: 3rem;
            height: 3rem;
        }
        
        .alert {
            margin-top: 1rem;
        }
        
        .mb-3 {
            margin-bottom: 1.5rem !important;
        }
        
        #output p {
            color: #e0e0e0;
            margin-bottom: 0.5rem;
        }
        
        .btn-success {
            background-color: #28a745;
            border-color: #28a745;
            font-weight: 500;
        }
        
        .btn-success:hover {
            background-color: #218838;
            border-color: #1e7e34;
        }
        
        .alert-danger {
            background-color: #dc3545;
            border-color: #dc3545;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">Stable Diffusion GUI</h1>
        
        <div class="card">
            <div class="card-body">
                <form id="sdForm">
                    <div class="mb-3">
                        <label for="model" class="form-label">Model</label>
                        <select class="form-select" id="model" name="model">
                            {% for model in models %}
                            <option value="{{ model }}">{{ model }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="lora" class="form-label">LoRA (Optional)</label>
                        <select class="form-select" id="lora" name="lora">
                            <option value="">None</option>
                            {% for lora in loras %}
                            <option value="{{ lora }}">{{ lora }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="prompt" class="form-label">Prompt</label>
                        <textarea class="form-control" id="prompt" name="prompt" rows="3" required></textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-3 mb-3">
                            <label for="width" class="form-label">Width</label>
                            <input type="number" class="form-control" id="width" name="width" value="1024" min="64" max="2048" step="64">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label for="height" class="form-label">Height</label>
                            <input type="number" class="form-control" id="height" name="height" value="768" min="64" max="2048" step="64">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label for="steps" class="form-label">Steps</label>
                            <input type="number" class="form-control" id="steps" name="steps" value="10" min="1" max="100">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label for="seed" class="form-label">Seed</label>
                            <div class="input-group">
                                <input type="number" class="form-control" id="seed" name="seed">
                                <button type="button" class="btn btn-outline-secondary" onclick="generateRandomSeed()">Random</button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mb-3 form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="useRandomSeed" name="useRandomSeed" checked>
                        <label class="form-check-label" for="useRandomSeed">Use random seed</label>
                    </div>
                    
                    <div class="mb-3">
                        <label for="filename" class="form-label">Filename (leave blank for auto-generated)</label>
                        <input type="text" class="form-control" id="filename" name="filename">
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Generate</button>
                </form>
            </div>
        </div>
        
        <div id="loading" class="loading">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Generating...</span>
            </div>
            <p class="mt-2">Generating image, please wait...</p>
        </div>
        
        <div id="output" class="card" style="display: none;">
            <div class="card-body">
                <h3>Generated Image</h3>
                <div class="text-center">
                    <img id="generatedImage" class="output-image" src="" alt="Generated image">
                </div>
                <div class="mt-3">
                    <p>Seed: <span id="outputSeed"></span></p>
                    <button id="downloadBtn" class="btn btn-success">Download Image & Parameters</button>
                </div>
            </div>
        </div>
        
        <div id="error" class="alert alert-danger mt-3" style="display: none;"></div>
    </div>

    <script>
        document.getElementById('sdForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Show loading, hide output and error
            document.getElementById('loading').style.display = 'block';
            document.getElementById('output').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            
            // Get form data
            const formData = {
                prompt: document.getElementById('prompt').value,
                height: parseInt(document.getElementById('height').value),
                width: parseInt(document.getElementById('width').value),
                steps: parseInt(document.getElementById('steps').value),
                seed: document.getElementById('seed').value,
                useRandomSeed: document.getElementById('useRandomSeed').checked,
                filename: document.getElementById('filename').value,
                model: document.getElementById('model').value,
                lora: document.getElementById('lora').value
            };
            
            // Send request to server
            fetch('/generate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(formData)
            })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(err => { throw new Error(err.error || 'Unknown error'); });
                }
                return response.json();
            })
            .then(data => {
                if (data.error) {
                    throw new Error(data.error);
                }
                
                // Display the generated image
                document.getElementById('generatedImage').src = data.image;
                document.getElementById('outputSeed').textContent = data.seed;
                document.getElementById('output').style.display = 'block';
                
                // Set up download button
                document.getElementById('downloadBtn').onclick = function() {
                    window.location.href = `/download/${data.filename}`;
                };
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('error').textContent = error.message;
                document.getElementById('error').style.display = 'block';
            })
            .finally(() => {
                document.getElementById('loading').style.display = 'none';
            });
        });
        
        function generateRandomSeed() {
            const randomSeed = Math.floor(Math.random() * 4294967295);
            document.getElementById('seed').value = randomSeed;
            document.getElementById('useRandomSeed').checked = false;
            document.getElementById('seed').disabled = false;
        }
        
        // Toggle seed input based on useRandomSeed checkbox
        document.getElementById('useRandomSeed').addEventListener('change', function() {
            document.getElementById('seed').disabled = this.checked;
        });
        
        // Initial setup
        document.getElementById('seed').disabled = true;
    </script>
</body>
</html>
